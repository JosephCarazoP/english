<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="https://i.pinimg.com/1200x/35/db/c0/35dbc007fac3ca49de68ecd77f690d27.jpg" />
  <title>Verb Flashcards - JC</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <header>
    <div class="logo">
      <img src="https://i.pinimg.com/1200x/35/db/c0/35dbc007fac3ca49de68ecd77f690d27.jpg" alt="Logo" class="logo-web">
    </div>
    <div class="header-right">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="irregular">Irregular</button>
      <button class="filter-btn" data-filter="regular">Regular</button>
      <button class="icon-btn" id="shuffleBtn" title="Shuffle">⇄</button>
      <button class="icon-btn" id="themeToggle" title="Toggle theme">☀︎</button>
    </div>
  </header>

  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 / 0</div>
  </div>

  <div class="score-row">
    <div class="score-item score-correct">
      <span class="score-val" id="scoreCorrect">0</span>
      <span class="score-lbl">Learned</span>
    </div>
    <div class="score-item score-skip">
      <span class="score-val" id="scoreSkip">0</span>
      <span class="score-lbl">Skipped</span>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="side-hint" id="sideHint">Present tense</div>

    <div class="card-scene" id="cardScene">
      <div class="card-inner">
        <div class="card-face front">
          <span class="type-badge" id="cardBadge"></span>
          <div class="verb-text" id="cardPresent"></div>
          <span class="tap-hint">tap to flip</span>
        </div>
        <div class="card-face back">
          <div class="verb-text" id="cardPast"></div>
          <div class="present-ref" id="cardPresentRef"></div>
          <span class="see-more">tap ✦ for details</span>
        </div>
      </div>
    </div>

    <div class="actions" id="actions">
      <button class="act-btn btn-skip" id="btnSkip">Skip ›</button>
      <button class="act-btn btn-correct" id="btnCorrect">Got it ✓</button>
      <button class="act-btn btn-detail" id="btnDetail">✦</button>
    </div>
  </div>

  <div class="stage" id="quizScreen" style="display: none; flex-direction: column; align-items: center; justify-content: center;">
    <div class="quiz-container" style="width: 100%; max-width: 500px; padding: 20px;">
      <h2 id="quizQuestion" style="text-align: center; margin-bottom: 30px; min-height: 80px; font-size: 1.5rem;"></h2>
      <div id="quizOptions" class="options-grid">
        </div>
    </div>
  </div>

  <div class="finish-screen" id="finishScreen">
    <div class="finish-emoji" id="finishEmoji">🎉</div>
    <div class="finish-title">Round complete!</div>
    <div class="finish-subtitle" id="finishSubtitle"></div>
    <div class="finish-stats">
      <div class="finish-stat ok"><b id="fCorrect">0</b><span>Learned</span></div>
      <div class="finish-stat"> <b id="fSkip">0</b> <span>Skipped</span></div>
      <div class="finish-stat"> <b id="fTotal">0</b> <span>Total</span></div>
    </div>
    <div class="finish-actions" style="display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px;">
      <button class="restart-btn" onclick="startQuiz()" id="startQuizBtn" style="background: var(--text); color: var(--bg);">Take Final Quiz 📝</button>
      <button class="restart-btn" id="restartBtn" style="background: transparent; border: 2px solid var(--progress-bg); color: var(--text);">Shuffle &amp; Restart</button>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-handle"></div>
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-badge" id="modalBadge"></div>
      <div class="modal-verbs">
        <span class="modal-present" id="modalPresent"></span>
        <span class="modal-arrow">→</span>
        <span class="modal-past" id="modalPast"></span>
      </div>
      <div class="modal-section-label">Present Tense Example</div>
      <div id="modalSentencePres" class="modal-sentence"></div>

      <div class="modal-section-label">Past Tense Example</div>
      <div id="modalSentencePast" class="modal-sentence"></div>
      <div class="modal-section-label"></div>
      <div class="modal-gif" id="modalGif">
        <span class="gif-msg">Loading…</span>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>Made by <b>Joseph Carazo</b> 🫡</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
