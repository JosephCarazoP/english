<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="https://i.pinimg.com/1200x/35/db/c0/35dbc007fac3ca49de68ecd77f690d27.jpg" />
  <title>Verb Flashcards - JC</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <header>
    <div class="logo">
      <img
        src="https://i.pinimg.com/1200x/35/db/c0/35dbc007fac3ca49de68ecd77f690d27.jpg"
        alt="Logo"
        class="logo-web"
        onclick="location.reload()"
        title="Restart"
      >
    </div>
    <div class="header-right">
      <div class="streak-badge" id="streakBadge" aria-label="Streak"></div>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="irregular">Irregular</button>
      <button class="filter-btn" data-filter="regular">Regular</button>
      <button class="icon-btn" id="shuffleBtn" title="Shuffle">⇄</button>
      <button class="icon-btn" id="themeToggle" title="Toggle theme">☀︎</button>
    </div>
  </header>

  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 / 0</div>
  </div>

  <div class="score-row">
    <div class="score-item score-correct">
      <span class="score-val" id="scoreCorrect">0</span>
      <span class="score-lbl">Learned</span>
    </div>
    <div class="score-item score-skip">
      <span class="score-val" id="scoreSkip">0</span>
      <span class="score-lbl">Skipped</span>
    </div>
  </div>

  <!-- ── FLASHCARD STAGE ── -->
  <div class="stage" id="stage">
    <div class="side-hint" id="sideHint">Present tense</div>

    <div class="card-scene" id="cardScene">
      <div class="card-inner">
        <div class="card-face front">
          <span class="type-badge" id="cardBadge"></span>
          <div class="verb-text" id="cardPresent"></div>
          <span class="tap-hint">tap to flip</span>
        </div>
        <div class="card-face back">
          <div class="verb-text" id="cardPast"></div>
          <div class="present-ref" id="cardPresentRef"></div>
          <span class="see-more">tap ✦ for details</span>
        </div>
      </div>
    </div>

    <div class="actions" id="actions">
      <button class="act-btn btn-skip"    id="btnSkip">Skip ›</button>
      <button class="act-btn btn-correct" id="btnCorrect">Got it ✓</button>
      <button class="act-btn btn-detail"  id="btnDetail">✦</button>
    </div>
  </div>

  <!-- ── QUIZ STAGE ── -->
  <div class="stage quiz-stage" id="quizScreen" style="display:none;">
    <div class="quiz-stack-wrap" id="qStackWrap">
      <div class="quiz-stack-cards" id="qStackCards">
        <div class="quiz-card c3" id="qCard3"></div>
        <div class="quiz-card c2" id="qCard2"></div>
        <div class="quiz-card top" id="qCard1">
          <div class="quiz-card-label" id="qLabel"></div>
          <div id="qBody"></div>
        </div>
      </div>
      <div class="quiz-dir-row" id="qDirRow" style="display:none;">
        <span class="quiz-dir-lbl">← swipe left</span>
        <span class="quiz-dir-lbl">swipe right →</span>
      </div>
      <div class="quiz-result-screen" id="quizResultScreen"></div>
    </div>
  </div>

  <!-- ── FINISH SCREEN ── -->
  <div class="finish-screen" id="finishScreen">
    <div class="finish-emoji" id="finishEmoji">🎉</div>
    <div class="finish-title">Round complete!</div>
    <div class="finish-subtitle" id="finishSubtitle"></div>
    <div class="finish-stats">
      <div class="finish-stat ok"><b id="fCorrect">0</b><span>Learned</span></div>
      <div class="finish-stat">   <b id="fSkip">0</b>   <span>Skipped</span></div>
      <div class="finish-stat">   <b id="fTotal">0</b>  <span>Total</span></div>
    </div>
    <div class="finish-actions">
      <button class="restart-btn" onclick="startQuiz()" style="background:var(--text);color:var(--bg);">Take Final Quiz 📝</button>
      <button class="restart-btn share-btn" id="shareFinishBtn" type="button">Share Results 📤</button>
      <button class="restart-btn" id="restartBtn" style="background:transparent;border:2px solid var(--progress-bg);color:var(--text);">Shuffle &amp; Restart</button>
    </div>
  </div>

  <!-- ── DETAIL MODAL (redesigned) ── -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-handle"></div>
      <button class="modal-close" id="modalClose" aria-label="Close">✕</button>

      <!-- Header strip: badge + spanish meaning chip -->
      <div class="modal-header-row">
        <span class="modal-badge" id="modalBadge"></span>
        <span class="modal-meaning-chip" id="modalMeaningChip"></span>
      </div>

      <!-- Hero: two pronunciation cards side by side -->
      <div class="pron-grid">
        <article class="pron-card pron-present">
          <div class="pron-tag">Present</div>
          <div class="pron-word" id="modalPresent"></div>
          <div class="pron-ipa" id="modalIpaPres"></div>
          <div class="pron-actions">
            <button class="pron-btn" data-form="pres" data-rate="normal" type="button" aria-label="Play present at normal speed">
              <span class="pron-btn-icon">▶</span><span class="pron-btn-lbl">Normal</span>
            </button>
            <button class="pron-btn pron-btn-slow" data-form="pres" data-rate="slow" type="button" aria-label="Play present slowly">
              <span class="pron-btn-icon">🐢</span><span class="pron-btn-lbl">Slow</span>
            </button>
          </div>
        </article>

        <div class="pron-arrow" aria-hidden="true">→</div>

        <article class="pron-card pron-past">
          <div class="pron-tag">Past</div>
          <div class="pron-word" id="modalPast"></div>
          <div class="pron-ipa" id="modalIpaPast"></div>
          <div class="pron-actions">
            <button class="pron-btn" data-form="past" data-rate="normal" type="button" aria-label="Play past at normal speed">
              <span class="pron-btn-icon">▶</span><span class="pron-btn-lbl">Normal</span>
            </button>
            <button class="pron-btn pron-btn-slow" data-form="past" data-rate="slow" type="button" aria-label="Play past slowly">
              <span class="pron-btn-icon">🐢</span><span class="pron-btn-lbl">Slow</span>
            </button>
          </div>
        </article>
      </div>

      <!-- Speed slider -->
      <div class="speed-row">
        <span class="speed-lbl">Speed</span>
        <div class="speed-presets" id="speedPresets">
          <button type="button" class="speed-preset" data-speed="0.5">0.5×</button>
          <button type="button" class="speed-preset" data-speed="0.75">0.75×</button>
          <button type="button" class="speed-preset active" data-speed="1">1×</button>
          <button type="button" class="speed-preset" data-speed="1.25">1.25×</button>
        </div>
        <span class="speed-val" id="speedVal">1.00×</span>
      </div>
      <input type="range" min="0.4" max="1.4" step="0.05" value="1" class="speed-slider" id="speedSlider" aria-label="Playback speed">

      <!-- Examples -->
      <div class="ex-block">
        <div class="ex-card ex-pres">
          <div class="ex-head">
            <span class="ex-tag">Present</span>
            <button class="ex-mini-play" id="playSentencePres" type="button" aria-label="Play present sentence">▶</button>
          </div>
          <div id="modalSentencePres" class="ex-text"></div>
        </div>
        <div class="ex-card ex-past">
          <div class="ex-head">
            <span class="ex-tag">Past</span>
            <button class="ex-mini-play" id="playSentencePast" type="button" aria-label="Play past sentence">▶</button>
          </div>
          <div id="modalSentencePast" class="ex-text"></div>
        </div>
      </div>

      <!-- GIF -->
      <div class="modal-gif" id="modalGif">
        <span class="gif-msg">Loading…</span>
      </div>
    </div>
  </div>

  <!-- ── SHARE TOAST ── -->
  <div class="share-toast" id="shareToast" role="status" aria-live="polite"></div>

  <footer class="site-footer">
    <p>Made by <b>Joseph Carazo</b> 🫡</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
